<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>kroak-time Scroll</title>
<!-- Visual properties are set via the [scroll] section of kroak-time-ticker.toml. -->
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 1920px;
    height: 1080px;
    background: transparent;
    overflow: hidden;
  }

  .scroll-container {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 1920px;
    overflow: hidden;
  }

  #scroll-track {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    white-space: nowrap;
    will-change: transform;
  }

  .seg        { display: inline-block; padding: 0 40px; }
  .lbl-now    { font-weight: 700; margin-right: 8px; }
  .lbl-next   { font-weight: 700; margin-right: 8px; }
  .lbl-up     { font-weight: 700; margin-right: 8px; }
  .singer-name{ font-weight: 600; }
  .song-title { font-style: italic; }
  .dot        { color: #555; margin: 0 10px; }
  .pipe       { color: #333; margin: 0 6px; }
  .up-num     { color: #666; margin-right: 6px; }
</style>
</head>
<body>
<div class="scroll-container" id="container">
  <div id="scroll-track">Starting...</div>
</div>

<script>
  // ── Config (injected from kroak-time-ticker.toml [scroll] at server startup) ──
  const cfg = __SCROLL_CFG__;

  // Apply layout/style from config.
  const container = document.getElementById('container');
  container.style.height     = cfg.height + 'px';
  container.style.background = cfg.bg;
  container.style.fontFamily = cfg.font;
  container.style.fontSize   = cfg.size + 'px';

  // Inject color rules so the class rules pick them up.
  document.head.insertAdjacentHTML('beforeend', `<style>
    .lbl-now    { color: ${cfg.color_now};    }
    .lbl-next   { color: ${cfg.color_next};   }
    .lbl-up     { color: ${cfg.color_up};     }
    .singer-name{ color: ${cfg.color_singer}; }
    .song-title { color: ${cfg.color_song};   }
    .song-artist{ color: ${cfg.color_artist}; }
    .up-entry   { color: ${cfg.color_artist}; }
  </style>`);

  // ── Scroll state ──────────────────────────────────────────────────────────
  const FETCH_MS = 1500;
  const track    = document.getElementById('scroll-track');

  let scrollX       = 0;
  let halfWidth     = 0;
  let lastTs        = null;
  let pendingLayout = false;
  let state         = null;

  // ── HTML builder ──────────────────────────────────────────────────────────
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function songHtml(singer) {
    if (!singer.next_song_title) return '';
    let s = `<span class="dot">·</span><span class="song-title">${esc(singer.next_song_title)}</span>`;
    if (singer.next_song_artist) {
      s += ` <span class="song-artist">by ${esc(singer.next_song_artist)}</span>`;
    }
    return s;
  }

  function buildContent(s) {
    if (!s || s.status === 'not_ready' || s.status === 'database_not_found') {
      return '<span class="seg" style="color:#666">Waiting for kroak-time…</span>';
    }
    if (!s.rotation || s.rotation.length === 0) {
      return '<span class="seg" style="color:#666">No singers in rotation</span>';
    }

    const parts     = [];
    const skipNames = new Set();

    if (s.is_playing && s.current_singer) {
      const c = s.current_singer;
      parts.push(
        `<span class="seg"><span class="lbl-now">NOW</span>` +
        `<span class="singer-name">${esc(c.name)}</span>${songHtml(c)}</span>`
      );
      skipNames.add(c.name);
    }

    const nextSinger = s.is_playing ? s.next_up : s.current_singer;
    if (nextSinger && !skipNames.has(nextSinger.name)) {
      parts.push(
        `<span class="seg"><span class="lbl-next">NEXT</span>` +
        `<span class="singer-name">${esc(nextSinger.name)}</span>${songHtml(nextSinger)}</span>`
      );
      skipNames.add(nextSinger.name);
    }

    const rest  = s.rotation.filter(r => !skipNames.has(r.name));
    const shown = rest.slice(0, Math.max(0, (s.singer_count || 8) - skipNames.size));

    if (shown.length > 0) {
      const entries = shown.map((r, i) => {
        const num  = i + skipNames.size + 1;
        let   html = `<span class="up-num">${num}.</span><span class="up-entry">${esc(r.name)}`;
        if (r.next_song_title) {
          html += ` <span class="song-title">${esc(r.next_song_title)}</span>`;
        }
        html += '</span>';
        return html;
      }).join('<span class="pipe">  </span>');

      parts.push(`<span class="seg"><span class="lbl-up">UP NEXT</span>${entries}</span>`);
    }

    return parts.join('<span class="pipe">◆</span>');
  }

  // ── Content update ────────────────────────────────────────────────────────
  const GAP = '<span style="display:inline-block;width:120px"></span>';

  function updateContent() {
    const html = buildContent(state);
    // Each copy carries its own trailing gap so halfWidth lands exactly at
    // the start of copy 2, making the loop reset pixel-perfect.
    track.innerHTML = html + GAP + html + GAP;
    pendingLayout = true;
    lastTs        = null; // discard the frame that includes reflow time
  }

  // ── Animation loop ────────────────────────────────────────────────────────
  function animate(ts) {
    if (pendingLayout) {
      const oldHalf = halfWidth;
      halfWidth     = track.scrollWidth / 2;
      pendingLayout = false;
      // Remap scrollX proportionally so position within the loop is preserved.
      if (oldHalf > 0 && halfWidth > 0) {
        scrollX = (scrollX % oldHalf) / oldHalf * halfWidth;
      } else if (halfWidth > 0 && scrollX >= halfWidth) {
        scrollX %= halfWidth;
      }
    }

    if (lastTs !== null && halfWidth > 0) {
      const delta = (ts - lastTs) / 1000;
      scrollX += cfg.speed * delta;
      if (scrollX >= halfWidth) scrollX -= halfWidth;
      track.style.transform = `translateY(-50%) translateX(${-scrollX}px)`;
    }

    lastTs = ts;
    requestAnimationFrame(animate);
  }

  // ── Data fetching ─────────────────────────────────────────────────────────
  async function fetchState() {
    try {
      const r    = await fetch('/api/state');
      const next = await r.json();
      if (JSON.stringify(next) !== JSON.stringify(state)) {
        state = next;
        updateContent();
      }
    } catch (_) {
      // Server temporarily unreachable — keep showing last state.
    }
  }

  requestAnimationFrame(animate);
  fetchState();
  setInterval(fetchState, FETCH_MS);
</script>
</body>
</html>
